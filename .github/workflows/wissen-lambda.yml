name: Deploy AWS Lambda

on:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - list files
        run: |
          pwd
          ls -R

      - name: Package Lambda
        run: |
          mkdir dist
          cp validation_function/lambda_function1.py dist/
          cd dist
          zip -r ../function.zip .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::447580526006:role/GitHubActionsLambdaDeployRole
          aws-region: us-east-1

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
          --function-name wissen-lambda \
          --zip-file fileb://function.zip
