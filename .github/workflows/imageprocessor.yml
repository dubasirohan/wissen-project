name: Deploy imageprocessor Lambda

on:
  push:
    paths:
      - 'imageprocessor/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # ✅ Create clean build folder
    - name: Prepare deployment package
      run: |
        mkdir -p build
        pip install pillow -t build

        # Copy your lambda file
        cp imageprocessor/lambda_function2.py build/

    # ✅ Zip everything correctly
    - name: Zip package
      run: |
        cd build
        zip -r ../function.zip .

    # ✅ Deploy to Lambda
    - name: Deploy to AWS Lambda
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
      run: |
        aws lambda update-function-code \
          --function-name imageprocessor \
          --zip-file fileb://function.zip
