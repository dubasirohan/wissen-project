name: Deploy imageprocessor Lambda

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install --target ./imageprocessor/package pillow

    - name: Zip Lambda package
      run: |
        cd imageprocessor/package
        zip -r ../function.zip .
        cd ..
        zip -g function.zip lambda_function2.py

    - name: Deploy to AWS Lambda
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
      run: |
        aws lambda update-function-code \
          --function-name imageprocessor \
          --zip-file fileb://imageprocessor/function.zip